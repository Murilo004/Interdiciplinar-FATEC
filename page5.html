<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carrinho - MKMG</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <strong>Sistema MKMG</strong>
  <nav>
    <a href="page4.html">Pedidos</a>
    <a href="page3.html">Serviços</a>
    <a href="page5.html">Carrinho</a>
  </nav>
  <div class="avatar"></div>
</header>

<div class="container">

  <h2>Carrinho de Compras</h2>

  <table id="carrinho">
    <thead>
      <tr>
          <th>Serviço</th>
          <th>Preço</th>
          <th>Ação</th>
      </tr>
    </thead>
    <tbody id="carrinho-body"></tbody>
  </table>

  <p>Total: R$ <span id="totalValor">0.00</span></p>

  <button id="cancelarPedido" class="btn-danger">Cancelar Pedido</button>

  <!-- ================== MODAL ================== -->
  <div id="confirmModal" class="modal" style="display:none;">
    <div class="modal-content">
        <p>Tem certeza que deseja cancelar o pedido?</p>

        <div class="modal-buttons">
            <button id="confirmarCancelamento" class="btn-danger">Sim</button>
            <button id="fecharModal">Não</button>
        </div>
    </div>
  </div>

  <button id="finalizarCompra" class="btn-finish">Finalizar Pedido</button>

  <!-- ================== MODAL ================== -->
  <div id="confirmarCompraModal" class="modal" style="display:none;">
    <div class="modal-content">
        <p>Deseja realmente finalizar a compra?</p>

        <div class="modal-buttons">
            <button id="confirmarFinalizacao" class="btn-primary">Sim</button>
            <button id="fecharModalCompra">Não</button>
        </div>
    </div>
  </div>


</div>

<script src="script.js"></script>
<div id="toast" class="toast"></div>
</body>
</html>
