<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Cadastrar - MKMG</title>
</head>

<body>

<div class="container" style="max-width:450px;">
  <h2 style="text-align:center;">Criar sua conta</h2>

  <label>Nome Completo</label>
  <input type="text">

  <label>Email</label>
  <input type="email">

  <label>Senha</label>
  <input type="password">

  <label>Confirmar Senha</label>
  <input type="password">

  <label>Função</label>
  <select>
    <option>Dentista</option>
    <option>Motoqueiro</option>
    <option>Protético</option>
  </select>

  <button class="btn-primary" style="width:100%;" onclick="showToast('Cadastro realizado com sucesso!')">Cadastrar</button>

  <p style="text-align:center; margin-top:15px;">
    Já tem uma conta? <a href="index.html">Entrar</a>
  </p>
</div>
<script src="script.js"></script>
<div id="toast" class="toast"></div>
</body>
</html>
